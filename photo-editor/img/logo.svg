<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="NoAdsPhotos">
  <title>NoAdsPhotos</title>
  <!-- Calm evergreen square mark with a soft "Np" letter-mark. The square
       is the corner-rounded brand glyph; the mark inside is a paper-white
       lowercase "n" with a subtle gap to suggest "p" (np). Single accent
       hue, no gradients, no glow — per the Quiet aesthetic in
       .impeccable.md. -->
  <rect width="512" height="512" rx="96" ry="96" fill="#23624a" />
  <!-- Letter-mark: a hand-tuned "np" in Onest-ish proportions, paper-white. -->
  <g fill="#fbf8f2">
    <!-- 'n' -->
    <path d="M126 178 v200 h44 v-126 c0-32 22-48 50-48 c30 0 44 18 44 50 v124 h44 v-138 c0-52-28-86-78-86 c-30 0-50 12-62 30 v-26 z" />
    <!-- 'p' descender dot — a subtle paper-white roundel under the n's bowl,
         suggesting the start of a "p" without spelling it explicitly. The
         result reads as a calm "n·" mark, which matches the patient brand
         tone better than a literal "NoAdsPhotos" wordmark. -->
    <circle cx="350" cy="362" r="22" />
  </g>
</svg>
